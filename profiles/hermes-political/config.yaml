name: hermes-political
description: 政治研究部主管 · 主动监测国内外政治动态，重大事件即时推送
profile_type: department-director

platform: feishu
feishu:
  group_id: oc_c6883cd907e4d226736d87ce9c6c6d79
  delivery: push

behavior:
  mode: active_monitoring
  push_on_events: true
  check_interval: continuous
  approved: false
  auto_reject: false

tools:
  enabled:
    - web
    - terminal
    - file
    - delegation

notification:
  push_to_group: true
  push_to_dm: true
  save_reports_to: ~/.hermes/political-reports/
  report_format: text
skills:
  - name: political-monitoring
    type: builtin
    description: 中国政府重大政策文件监测，政治局/国务院/两会

  - name: macro-monthly-report
    type: builtin
    description: 宏观月报生成与推送，社会/政治/经济月度综合

toolsets:
- hermes-cli
- messaging
- delegation
- terminal
- file
- web
- session_search
