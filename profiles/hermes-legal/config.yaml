model:
  default: MiniMax-M2.7
  provider: minimax-cn
  base_url: https://api.minimaxi.com/anthropic
providers: {}
fallback_providers: []
skills:
  - legal-system
  - political-monitoring
notify_to:
  - oc_c6883cd907e4d226736d87ce9c6c6d79
workdir: /home/ubuntu/.hermes/army-workspace/legal
memory: |
  法律部按 Anthropic 官方 claude-for-legal 模板构建。
  9个垂直领域：corporate-legal / commercial-legal / employment-legal / ip-legal / litigation-legal / privacy-legal / product-legal / regulatory-legal / ai-governance-legal
  专职Agent：renewal-watcher / deal-debrief / playbook-monitor / dataroom-watcher / leave-tracker / ip-renewal-watcher / docket-watcher / launch-watcher / reg-change-monitor
  所有输出为草稿，需律师审核确认，不构成法律结论。
toolsets:
- hermes-cli
- messaging
- delegation
- terminal
- file
- web
agent:
  max_turns: 90
  gateway_timeout: 1800
  restart_drain_timeout: 60
  tool_use_enforcement: auto
  gateway_timeout_warning: 900
  gateway_notify_interval: 600
  verbose: false
  reasoning_effort: medium
terminal:
  backend: local
  timeout: 180
  persistent_shell: true
  lifetime_seconds: 300
browser:
  inactivity_timeout: 120
  command_timeout: 30
checkpoints:
  enabled: true
  max_snapshots: 50
compression:
  enabled: true
  threshold: 0.5
  target_ratio: 0.2
  protect_last_n: 20
  summary_model: google/gemini-3-flash-preview
  summary_provider: auto
smart_model_routing:
  enabled: false
auxiliary:
  vision:
    provider: auto
  web_extract:
    provider: auto
  compression:
    provider: auto
  session_search:
    provider: auto
  skills_hub:
    provider: auto
  approval:
    provider: auto
  mcp:
    provider: auto
  flush_memories:
    provider: auto
display:
  compact: false
  personality: professional
  resume_display: full
  busy_input_mode: interrupt
  bell_on_complete: false
  show_reasoning: false
  streaming: true
  inline_diffs: true
  show_cost: false
  skin: default
  tool_progress_command: false
  tool_progress: all
  background_process_notifications: all
privacy:
  redact_pii: false
tts:
  provider: edge
stt:
  enabled: true
  provider: local
voice:
  record_key: ctrl+b
  max_recording_seconds: 120
  auto_tts: false
context:
  engine: compressor
memory:
  memory_enabled: true
  user_profile_enabled: true
  memory_char_limit: 8000
  user_char_limit: 4000
  provider: honcho
  nudge_interval: 10
  flush_min_turns: 6
delegation:
  model: ''
  provider: ''
  max_iterations: 50
  default_toolsets:
  - terminal
  - file
  - web
honcho:
  enabled: true
  user_workspace: /home/ubuntu/.hermes/army-workspace/legal
timezone: Asia/Shanghai
approvals:
  mode: auto
  timeout: 60
security:
  redact_secrets: true
  tirith_enabled: true
  tirith_path: tirith
  tirith_timeout: 5
  tirith_fail_open: true
cron:
  wrap_response: true
logging:
  level: INFO
  max_size_mb: 5
  backup_count: 3
network:
  force_ipv4: false
_config_version: 16
session_reset:
  mode: both
  idle_minutes: 1440
  at_hour: 4
  max_messages: 80
group_sessions_per_user: true
platform_toolsets:
  cli:
  - browser
  - clarify
  - code_execution
  - cronjob
  - delegation
  - file
  - memory
  - session_search
  - skills
  - terminal
  - todo
  - tts
  - vision
  - web
custom_providers:
- name: minimax-cn
  base_url: https://api.minimaxi.com/anthropic
  api_key_env: MINIMAX_CN_API_KEY
  api_mode: anthropic_messages
  model: MiniMax-M2.7
web:
  backend: firecrawl
platforms:
  feishu:
    enabled: true
    extra:
      app_id: ''
      app_secret: ''
      connection_mode: websocket
      domain: feishu
      allow_all_users: true
      group_policy: open
      group_chat_id: oc_08f6cb45cf9c2132e7ee86fd6fb5dec9
onboarding:
  seen: {}